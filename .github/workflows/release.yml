name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: orchestrator-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: orchestrator-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: orchestrator-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: orchestrator-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: orchestrator-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/orchestrator ${{ matrix.binary }}
          chmod +x ${{ matrix.binary }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/orchestrator.exe ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Display structure of downloaded files
        run: ls -R binaries/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: binaries/**/*
          body: |
            # Agent Supervisor ${{ github.ref_name }}

            Agent Supervisor is an OpenCode-native multi-agent control plane while preserving the current `opencode-orchestrator` package identity.

            ### Current Runtime
            *   OpenCode plugin registration and agent configuration.
            *   Commander, Planner, Worker, and Reviewer agent scaffolding.
            *   Session-based worker orchestration through the OpenCode client.
            *   Local concurrency, notification, metrics, and Rust helper tooling.

            ### Planned Control-Plane Direction
            *   Server-first REST API for task control.
            *   Telegram approval and notification layer.
            *   Provider/model routing and policy-based approval escalation.
            *   Prometheus metrics, persistent task state, and audit logs.

            ---
            ## Installation
            ```bash
            bun add -g opencode-orchestrator
            ```
          generate_release_notes: true
          fail_on_unmatched_files: false

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare binaries for NPM
        run: |
          mkdir -p bin
          cp binaries/orchestrator-linux-x64/orchestrator-linux-x64 bin/
          cp binaries/orchestrator-linux-arm64/orchestrator-linux-arm64 bin/
          cp binaries/orchestrator-macos-x64/orchestrator-macos-x64 bin/
          cp binaries/orchestrator-macos-arm64/orchestrator-macos-arm64 bin/
          cp binaries/orchestrator-windows-x64.exe/orchestrator-windows-x64.exe bin/
          chmod +x bin/*

      - name: Publish to GitHub Registry
        run: |
          printf '@agnusdei1207:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=${NPM_CONFIG_TOKEN}\n' > .npmrc
          bun -e "const fs=require('node:fs'); const pkg=require('./package.json'); pkg.name='@agnusdei1207/opencode-orchestrator'; pkg.publishConfig={registry:'https://npm.pkg.github.com'}; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          bun publish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.GITHUB_TOKEN }}
